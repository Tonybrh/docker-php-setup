services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-api
    restart: unless-stopped
    command: php-fpm
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel-network

  nginx:
    image: nginx:alpine
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www
      - ./.docker/compose/nginx:/etc/nginx/conf.d
    networks:
      - laravel-network
    depends_on:
      - app

  postgres:
    container_name: app-postgres
    image: postgres:16
    restart: always
    networks:
      - laravel-network
    environment:
      POSTGRES_PASSWORD: app-db
      POSTGRES_USER: app-db
      POSTGRES_DB: app-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - local

networks:
  laravel-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

